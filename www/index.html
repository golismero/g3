        function Login(username, password) {
            var xhttp = new XMLHttpRequest();
            xhttp.open("POST", "/api/auth/login", false);
            xhttp.setRequestHeader("Content-type", "application/json");
            xhttp.send("{\"username\":\"" + username + "\",\"password\":\"" + password + "\"}");
            if (xhttp.status === 200) {
                var obj = JSON.parse(xhttp.responseText);
                return obj.data;
            } else {
                document.getElementById("uploadFile").disabled = true;
                document.getElementById("uploadButton").disabled = true;
                throw new Error('Request failed: ' + xhttp.statusText);
            }
        }

        function GetTicket(token) {
            var xhttp = new XMLHttpRequest();
            xhttp.open("POST", "/api/auth/ticket", false);
            xhttp.setRequestHeader("Content-type", "application/json");
            xhttp.send("{\"token\":\"" + token + "\"}");
            if (xhttp.status === 200) {
                var obj = JSON.parse(xhttp.responseText);
                return obj.data;
            } else {
                document.getElementById("uploadFile").disabled = true;
                document.getElementById("uploadButton").disabled = true;
                throw new Error('Request failed: ' + xhttp.statusText);
            }
        }

        function PopulateFileList(token) {
            var xhttp = new XMLHttpRequest();
            xhttp.open("POST", "/api/file/ls", false);
            xhttp.setRequestHeader("Content-type", "application/json");
            xhttp.send("{\"token\":\"" + token + "\"}");
            if (xhttp.status === 200) {

                // Get the table with the file list.
                var t = document.getElementById("fileList");

                // Delete the previously existing rows, if any.
                // Do not delete the header row.
                let r = t.rows.length - 1;
                while (r > 0) {
                    console.log(r);
                    t.deleteRow(r);
                    r--;
                }

                // Parse the response.
                var obj = JSON.parse(xhttp.responseText);
                if (obj === null || obj.data === null) {
                    return;
                }

                // Insert a new row for each file.
                let i = 0;
                while (i < obj.data.length) {
                    var item = obj.data[i];
                    var tr = document.createElement("tr");
                    var td = document.createElement("td");
                    var a = document.createElement('a');
                    var linkText = document.createTextNode(item.name);
                    a.title = item.name;
                    a.href = "/api/file/download?fileid=" + item.fileid;
                    a.appendChild(linkText);
                    td.appendChild(a);
                    tr.appendChild(td);
                    td = document.createElement("td");
                    td.appendChild(document.createTextNode(item.size));
                    tr.appendChild(td);
                    td = document.createElement("td");
                    td.appendChild(document.createTextNode(new Date(item.ts * 1e3).toISOString()));
                    tr.appendChild(td);
                    td = document.createElement("td");
                    var img = document.createElement("img");
                    img.src = trashcan;
                    img.role = "button";
                    img.id = "img-" + item.fileid;
                    img.addEventListener('click', (e) => {
                        e.preventDefault();
                        var token = document.getElementById("authTicket").value;
                        var fileid = e.currentTarget.id.slice(4);
                        DeleteFile(token, fileid);
                    })
                    td.appendChild(img);
                    tr.appendChild(td);
                    tr.id = item.fileid;
                    t.appendChild(tr);
                    //console.log(item.fileid);
                    i++;
                }

            // Throw an exception on error.
            } else {
                throw new Error('Request failed: ' + xhttp.statusText);
            }
        }

        function DeleteFile(token, fileid) {
            var xhttp = new XMLHttpRequest();
            xhttp.open("POST", "/api/file/rm", false);
            xhttp.setRequestHeader("Content-type", "application/json");
            xhttp.send("{\"token\":\"" + token + "\", \"fileid\": \"" + fileid + "\"}");
            if (xhttp.status === 200) {
                document.getElementById(fileid).remove();
            } else {
                throw new Error('Request failed: ' + xhttp.statusText);
            }
        }

        function HandleFileUpload(event) {
            const form = event.currentTarget;
            const url = new URL(form.action);
            const formData = new FormData(form);
            const fetchOptions = {
                method: form.method,
            };
            fetchOptions.body = formData;
            fetch(url, fetchOptions).then(function(response) {
                var token = document.getElementById("authTicket").value;
                PopulateFileList(token);
            });
            event.preventDefault();
        }

    <body>
        <form enctype="multipart/form-data" action="/api/file/upload" method="post" id="uploadForm">
            <input type="hidden" name="auth" id="authTicket" />
            <input type="file" name="file" id="uploadFile" />
            <input type="submit" value="upload" id="uploadButton" />
        </form>
        <table id="fileList">
            <tr id="fileListHeader">
                <td><b>Name</b></td>
                <td><b>Size</b></td>
                <td><b>Last modified</b></td>
                <td></td>
            </tr>
        </table>
        <script>
            var token = Login("admin", "admin")
            var ticket = GetTicket(token)
            document.getElementById("authTicket").value = ticket
            var date = new Date();
            date.setTime(date.getTime() + 60000);
            document.cookie = "auth=" + ticket + "; expires=" + date.toUTCString() + "; path=/api/file/";
            PopulateFileList(token, ticket)
            var form = document.getElementById("uploadForm");
            form.addEventListener('submit', HandleFileUpload);
        </script>
    </body>
