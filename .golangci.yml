version: "2"

linters:
  default: standard
  exclusions:
    rules:
      - linters: [staticcheck]
        text: "ST1005"
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*mime/multipart.Part).Close
        - (*mime/multipart.Writer).Close
        - (*io.PipeReader).Close
        - (*io.PipeWriter).Close
        - (*net/http.Server).Shutdown
        - (*github.com/gorilla/websocket.Conn).Close
        - (*go.mongodb.org/mongo-driver/mongo.Client).Disconnect
        - (*go.mongodb.org/mongo-driver/mongo.Cursor).Close
        - (*golismero.com/g3lib.SyncWebSocket).WriteError
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - golismero.com/g3lib.LoadDotEnvFile
        - golismero.com/g3lib.DisconnectFromKeyValueStore

        # TODO: temporary — these MQTT send functions DO have errors worth
        # handling. A failed send means a lost message that currently goes
        # undetected and unlogged (scan status updates, cancel/stop signals,
        # progress, empty responses from workers). Remove these exclusions
        # once proper error handling is added in a follow-up task.
        - golismero.com/g3lib.SendTaskCancel
        - golismero.com/g3lib.SendScanFailed
        - golismero.com/g3lib.SendScanProgress
        - golismero.com/g3lib.SendScanStopped
        - golismero.com/g3lib.SendScanCompleted
        - golismero.com/g3lib.SendEmptyResponse
